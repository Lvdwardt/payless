# Payless archive proxy — deploy as its OWN Coolify resource (Docker Compose).
# Isolated from the cruisello backend workers; nothing here touches them.
#
# Coolify setup:
#   1. New Resource → Docker Compose → point at this repo / this file.
#   2. Map ONE domain → port (Coolify issues TLS):
#        archive.cruisello.com → 8788   (proxy API AND same-origin noVNC)
#      There is NO separate VNC domain any more — do not map archive-vnc.*.
#   3. No VNC env needed. VNC_INTERNAL=1 (below) makes the proxy serve + gate
#      noVNC itself: no public VNC port, no password. The solve page embeds
#      noVNC same-origin and the websocket only opens for a live solve token.
#
# After deploy: warm the jar once by opening an article in the app, tapping the
# CAPTCHA prompt, and solving in the embedded noVNC. The qki cookie (~1h) then
# serves every device until it goes cold.

services:
  archive-proxy:
    build:
      context: .
      dockerfile: Dockerfile.archive-proxy
    environment:
      - ARCHIVE_PROXY_PORT=8788
      - COOKIE_STORE_PATH=/data/cookies.json
      - CROSS_SITE=1
      # Serve + gate noVNC same-origin through the proxy (no public VNC door).
      - VNC_INTERNAL=1
    volumes:
      - archive-data:/data
    # Chromium needs more than the default 64MB /dev/shm.
    shm_size: "1gb"
    # expose, not ports: Coolify's Traefik routes the domain to 8788 over its
    # internal network + issues TLS. noVNC (websockify) is loopback-only inside
    # the container and reached only via the proxy's gated /vnc/* — never exposed.
    expose:
      - "8788"
    restart: unless-stopped

volumes:
  archive-data:
